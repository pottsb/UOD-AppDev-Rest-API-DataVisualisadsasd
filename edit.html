<!DOCTYPE html>
<html>
  <head>
    <title>Insurance Data Visualisation - Edit Data</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="Scripts/Frameworks/jquery-1.10.2.min.js"></script>
    <script src="Scripts/Frameworks/bootstrap.min.js"></script>
    <script src="Scripts/Frameworks/modernizr-2.6.2.js"></script>
    <script src='Scripts/Frameworks/jquery.dynatable.js' type='text/javascript'></script>
    <script src="Scripts/Site.js"></script>
    <link href="CSS/Site.css" rel="stylesheet" />
    <link href="CSS/bootstrap.min.css" rel="stylesheet" />
    <link href="CSS/jquery.dynatable.css" rel="stylesheet" media="all" />
  </head>
  <body>
    <div class="navbar navbar-inverse navbar-fixed-top">
      <div class="container linkContainer">
        <div class="navbar-header">
          <a class="navbar-brand" href="/">Insurance Data Visualisation</a>
          <a class="navbar-brand" href="/edit.html">Edit Data</a>
        </div>
      </div>
      <div class="filtersColContainer">
        <input type="button" value="Get All Drivers" class="btn btn-sm btn-primary" onclick="createDriverTable();" />
        <input type="button" value="Add New Driver" class="btn btn-sm btn-primary" onclick="createNewDriverForm();" />
      </div>
    </div>
    <div class="container body-content">
      <div id="mainContent"></div>
      <div id="newdriverform"></div>
      <footer><p>&copy; 2023 - 100191919</p></footer>
    </div>
    <div class="modal fade" id="Modal" tabindex="-1" role="dialog" aria-labelledby="ModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="ModalLabel"></h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" id="ModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" data-dismiss="modal" id="ModalConfirmButton">Save changes</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
